window.addEventListener('load', () => {

        document.addEventListener('click', function autoPlayFix() {
            nhac.play();
            document.removeEventListener('click', autoPlayFix);
        }, { once: true });

});

        dongThongBao();
        alert('🔑 Key: ' + keyDangLay + '\n✅ Đã sao chép!');
        navigator.clipboard.writeText(keyDangLay || '');
    };
}

// Đóng thông báo
function dongThongBao() {
    document.getElementById('hopThongBao').classList.remove('hien');
}

// Mở trang chính

    document.getElementById('manHinhChao').classList.add('dong');
