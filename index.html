<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FANG HAKI</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif}
        body{color:#fff;line-height:1.4}

        /* ========== MÀU NỀN CHUNG ========== */
        .phan-1, .phan-2, .phan-3{background-color:#000000}

        /* ========== PHẦN 1 - TRANG ĐẦU ========== */
        .phan-1{min-height:100vh;padding:24px 20px;position:relative}
        .thoi-gian{display:inline-flex;align-items:center;gap:6px;background:#111;border:2px solid #ffb74d;padding:10px 22px;border-radius:30px;font-size:18px;font-weight:500;color:#fff;box-shadow:0 2px 6px rgba(255,152,0,0.2)}
        .menu-btn{position:absolute;top:24px;right:20px;width:48px;height:48px;background:#111;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;box-shadow:0 2px 8px rgba(255,255,255,0.05)}
        .avatar-khung{text-align:center;margin-top:80px;margin-bottom:24px}
        .avatar{width:140px;height:140px;border-radius:50%;border:3px solid #333;object-fit:cover;background:#222}
        .ten-nho{display:inline-block;background:#222;padding:8px 24px;border-radius:20px;font-size:17px;color:#aaa;margin-bottom:16px}
        .chao-txt{text-align:center;font-size:22px;color:#888;margin-bottom:8px}
        .ten-lon{text-align:center;font-size:44px;font-weight:800;margin-bottom:12px}
        .dau-tich-xanh{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:#3b82f6;border-radius:50%;color:#fff;font-size:20px;margin-left:8px;vertical-align:middle}
        .huong-dan-txt{text-align:center;font-size:24px;color:#666;margin-bottom:45px}
        .thong-ke-khung{display:flex;justify-content:space-around;align-items:center;gap:10px;background:#111;padding:28px 20px;border-radius:24px;max-width:500px;margin:0 auto;box-shadow:0 4px 20px rgba(0,0,0,0.2)}
        .cot-tk{text-align:center;flex:1}
        .so-tk{font-size:42px;font-weight:700;color:#666;margin-bottom:6px}
        .chu-tk{font-size:18px;color:#888}
        .ngang-ke{width:1px;height:40px;background:#222}

        /* ========== PHẦN 2 - SẢN PHẨM ========== */
        .phan-2{padding:40px 20px}
        .tieu-de-phan2{font-size:34px;font-weight:800;margin-bottom:24px;background:linear-gradient(90deg,#ff4081,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .khung-sp{background:#111;border-radius:22px;padding:18px;border:1px solid #222;max-width:500px;margin:0 auto}
        .anh-sp-khung{width:100%;height:240px;border-radius:14px;margin-bottom:20px;background:#222;overflow:hidden}
        .anh-sp-khung img{width:100%;height:100%;object-fit:cover;border-radius:14px}
        .nhan-capnhat{display:inline-flex;align-items:center;gap:8px;background:#15803d;color:#fff;padding:10px 22px;border-radius:30px;font-size:17px;margin-bottom:16px}
        .ten-sp{font-size:26px;font-weight:bold;margin-bottom:12px;color:#fff}
        .mo-ta-sp{color:#aaa;margin-bottom:24px;font-size:18px;line-height:1.6}
        .nut-group{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;align-items:center}
        .nut-sp{padding:18px 10px;border-radius:16px;text-align:center;text-decoration:none;color:#fff;font-weight:bold;font-size:20px;border:none;cursor:pointer;white-space:nowrap}
        .nut-xanh{background:linear-gradient(135deg,#2196f3,#42a5f5)}
        .nut-vang{background:linear-gradient(135deg,#ffc107,#ffca28);color:#111}
        .nut-hong{background:linear-gradient(135deg,#ec407a,#d81b60)}

        /* ========== PHẦN 3 - CHÂN TRANG ========== */
        .phan-3{padding:50px 20px 40px;text-align:center;border-top:1px solid #222}
        .ten-chan{font-size:48px;font-weight:800;background:linear-gradient(90deg,#81ff81,#00e5ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
        .mo-ta-chan{font-size:24px;color:#888;margin-bottom:16px}
        .tieuchi-chan{font-size:32px;font-weight:bold;margin-bottom:32px;letter-spacing:1px;background:linear-gradient(90deg,#d4ff33,#76ff03);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .nut-chan-wrap{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin-bottom:30px}
        .nut-chan{background:#27272a;padding:18px 40px;border-radius:50px;text-decoration:none;color:#ddd;font-size:20px;font-weight:500}
        .ban-quyen{font-size:22px;color:#666}
        .nut-len-top{display:flex;align-items:center;justify-content:center;width:52px;height:52px;background:#27272a;border-radius:8px;color:#fff;font-size:24px;text-decoration:none;margin-top:20px;margin-left:auto}

        /* ========== NHẠC NỀN ========== */
        #nhacNen{display:none}
    </style>
</head>

<script>
// ========== ĐỒNG HỒ CHẠY ĐÚNG GIỜ THỰC TẾ ==========
function capNhatGio() {
    const now = new Date();
    const gio = String(now.getHours()).padStart(2, '0');
    const phut = String(now.getMinutes()).padStart(2, '0');
    const giay = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('dongHo').textContent = `${gio}:${phut}:${giay}`;
}
capNhatGio();
setInterval(capNhatGio, 1000);

// ========== NHẠC TỰ ĐỘNG PHÁT ==========
const nhac = document.getElementById('nhacNen');
document.addEventListener('DOMContentLoaded', function() {
    nhac.volume = 0.5;
    function thuPhatNhac() {
        nhac.play().catch(function() {
            document.addEventListener('click', function() {
                nhac.play();
            }, { once: true });
        });
    }
    thuPhatNhac();
});
</script>
